services:
  - type: web
    name: onix-feeding-backend
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: onix-feeding-db
          property: connectionString
      - key: DB_ECHO
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_HOURS
        value: "24"
      - key: CORS_ORIGINS
        value: "https://onix-feeding-frontend.onrender.com"

databases:
  - name: onix-feeding-db
    plan: free
    databaseName: feedsystemdb
    user: onix
